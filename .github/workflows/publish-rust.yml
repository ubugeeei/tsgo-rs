name: Publish Rust

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      confirm:
        description: Type `publish-rust` to continue
        required: true
        type: string
      auth_mode:
        description: Authentication mode for manual runs
        required: true
        default: trusted
        type: choice
        options:
          - trusted
          - token

permissions:
  contents: read

concurrency:
  group: publish-rust
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release-gates:
    if: ${{ github.event_name == 'push' || inputs.confirm == 'publish-rust' }}
    name: Release Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Go for pinned tsgo ref
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: true

      - name: Validate release tag
        if: ${{ github.event_name == 'push' }}
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node --strip-types ./scripts/assert_release_tag.ts

      - name: Check JS and TS
        run: vp check

      - name: Check Rust formatting
        run: vp run -w fmt_check_rust

      - name: Lint Rust
        run: vp run -w lint_rust

      - name: Test
        run: vp run -w test

      - name: Sync pinned tsgo checkout
        run: vp run -w sync_ref

      - name: Verify pinned tsgo checkout
        run: vp run -w verify_ref

      - name: Benchmark guards
        run: vp run -w bench_verify

      - name: Cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

      - name: Release dry run
        run: vp run -w release_dry_run

  publish:
    if: ${{ github.event_name == 'push' || inputs.confirm == 'publish-rust' }}
    name: Publish Rust Crates
    needs:
      - release-gates
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Exchange OIDC token for crates.io token
        if: ${{ github.event_name == 'push' || inputs.auth_mode == 'trusted' }}
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish ordered crates with trusted publishing
        if: ${{ github.event_name == 'push' || inputs.auth_mode == 'trusted' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: node --strip-types ./scripts/publish_rust.ts

      - name: Publish ordered crates with token bootstrap
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.auth_mode == 'token' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: node --strip-types ./scripts/publish_rust.ts
