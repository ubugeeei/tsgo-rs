name: Publish npm

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type `publish-npm` to continue
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-npm
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release-gates:
    if: ${{ inputs.confirm == 'publish-npm' }}
    name: Release Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Go for pinned tsgo ref
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: true

      - name: Check JS and TS
        run: vp check

      - name: Check Rust formatting
        run: vp run -w fmt_check_rust

      - name: Lint Rust
        run: vp run -w lint_rust

      - name: Test
        run: vp run -w test

      - name: Verify pinned tsgo checkout
        run: vp run -w verify_ref

      - name: Benchmark guards
        run: vp run -w bench_verify

      - name: Cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

      - name: Release dry run
        run: vp run -w release_dry_run

  publish:
    if: ${{ inputs.confirm == 'publish-npm' }}
    name: Publish npm packages
    needs:
      - release-gates
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: true

      - name: Build publishable npm artifacts
        run: vp run -w build

      - name: Placeholder for napi-rs cross-build fan-out
        run: |
          echo "TODO: replace this runner-local build with multi-platform napi-rs artifact packaging before advertising cross-platform prebuild support."

      - name: Publish packed tarballs with npm trusted publishing
        run: node ./scripts/publish_npm.mjs
